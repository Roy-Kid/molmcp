name: CI

on:
  push:
    branches: [master, main, dev, dev-*]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest,  python-version: '3.12', package: molcrafts-molmcp, test-path: tests}
          - {os: ubuntu-latest,  python-version: '3.12', package: molmcp-molpy,    test-path: packages/molmcp-molpy/tests}
          - {os: ubuntu-latest,  python-version: '3.12', package: molmcp-molexp,   test-path: packages/molmcp-molexp/tests}
          - {os: ubuntu-latest,  python-version: '3.12', package: molmcp-lammps,   test-path: packages/molmcp-lammps/tests}
          - {os: ubuntu-latest,  python-version: '3.12', package: molmcp-gateway,  test-path: apps/molmcp-gateway/tests}
          - {os: ubuntu-latest,  python-version: '3.13', package: molcrafts-molmcp, test-path: tests}
          - {os: macos-latest,   python-version: '3.12', package: molcrafts-molmcp, test-path: tests}
          - {os: windows-latest, python-version: '3.12', package: molcrafts-molmcp, test-path: tests}

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync ${{ matrix.package }}
        run: uv sync --package ${{ matrix.package }} --extra dev

      - name: Run tests for ${{ matrix.package }}
        run: uv run --package ${{ matrix.package }} pytest -v ${{ matrix.test-path }}

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Build core distribution
        run: uv build --package molcrafts-molmcp
